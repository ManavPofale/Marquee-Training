<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Container</title>
    <style>
        
        .grid{
            display: grid;
            grid-template-rows: repeat(3, 100px);
            grid-template-columns: repeat(4, 100px);
            gap : 8px;
        }
        
        .item1{
            grid-row: 1/2;
            grid-column: 1/2;
            background-color: rgb(58, 5, 248);
        }
        
        .item2{
            grid-row: 1/2;
            grid-column: 2/3;
            background-color: brown;
        }
        
        .item3{
            grid-row: 1/2;
            grid-column: 3/5;
            background-color: rgb(5, 245, 121);
        }
        
        .item4{
            grid-row: 2/3;
            grid-column: 1/5;
            background-color: rgb(225, 225, 50);
        }
        
        .item5{
            grid-row: 3/4;
            grid-column: 1/2;
            background-color: orange;
        }
        
        .item6{
            grid-row: 3/4;
            grid-column: 2/5;
            background-color: skyblue;
        }


    </style>
</head>
<body>
    <div class = "grid">
        <div class = item1></div>
        <div class = item2></div>
        <div class = item3></div>
        <div class = item4></div>
        <div class = item5></div>
        <div class = item6></div>
    </div>
</body>
</html>
