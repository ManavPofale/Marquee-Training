<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
    <style>
        
        .dashboard {
            width: 800px;
            height: 600px;
            border: 2px solid black;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            background-color: black;
            gap: 5px;
            padding: 4px;
        }

        .box {
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;

        }

        .box1{
            grid-column: 1 / 2;
            grid-row: 1 / -1;
            background-color: rgb(52, 52, 201);
        }

        .box2 {
            grid-column: 2 / -1;
            grid-row: 1 / 2;
            background-color: rgb(16, 211, 152);
        }
        .box3 {
            background-color: rgb(47, 156, 211);   
        }
        .box4 {
            background-color: rgb(43, 215, 138);   
        }
        .box5 {
            background-color: rgb(204, 135, 31);   
        }
        .box6 {
            grid-column: 2 / 4;
            grid-row: 3 / 5;
            background-color: rgb(134, 46, 211);   
        }
        .box7 {
            grid-row: 3 / 5;
            background-color: rgb(204, 24, 150);   
        }
        .box8 {
            background-color: rgb(22, 225, 248);   
        }
        .box9 {
            background-color: rgb(22, 225, 248);   
        }
        .box10 {
            background-color: rgb(22, 225, 248);   
        }



    </style>
</head>
<body>
    <div class="dashboard">
        <div class="box1 box"><h3>Sidebar</h3></div>
        <div class="box2 box"><h3>Top Navigation</h3></div>
        <div class="box3 box"><h3>Users<br>12,450</h3></div>
        <div class="box4 box"><h3>Revenue<br>$24,800</h3></div>
        <div class="box5 box"><h3>Orders<br>1,234</h3></div>
        <div class="box6 box"><h3>📊Chart<br>(span 2)</h3></div>
        <div class="box7 box"><h3>Table</h3></div>
        <div class="box8 box"><h3>Widget1</h3></div>
        <div class="box9 box"><h3>Widget2</h3></div>
        <div class="box10 box"><h3>Widget3</h3></div>
    </div>
</body>
</html>
