<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    .box{
        height: 200px;
        width: 350px;
        background-color: grey;
        border: 2px solid black;
        display: inline-block;
        padding: 50px;
    }
    .box1{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(8, 11, 9);
        border: 2px solid rgb(227, 217, 217);
        /* position: relative; */
    }
    .box1:hover{
        background-color: red;
        border-radius: 50%;
    }
    
    .box2{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(2, 7, 4);
        border: 2px solid rgb(238, 234, 234);
    }
    .box2:active{
        visibility: hidden;
    }
    .box3{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(1, 8, 4);
        border: 2px solid rgb(238, 234, 234);
    }
    .box3:active{
        background-color: yellow;
        scale: 1.5;
    }
    .box4{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(3, 8, 5);
        border: 2px solid rgb(238, 234, 234);
    }
    .box :nth-child(6){
        border-radius: 20%;

    }
    .box5{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(4, 6, 5);
        border: 2px solid rgb(238, 234, 234);
    }
    .box6{
        height: 100px;
        width: 100px;
        display: inline-block;
        background-color: rgb(7, 11, 9);
        border: 2px solid rgb(238, 234, 234);
    }
    
</style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
        <input type="text" name="" id="" placeholder="Enter your name">

    </div>
    <a href="https://openai.com">Openai</a>
        
</body>
